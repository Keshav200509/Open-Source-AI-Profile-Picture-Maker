services:
  - type: web
    name: ai-profile-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm ci --include=dev && npm run build && cd ../frontend && npm ci && npm run build
    startCommand: node backend/dist/server.js
    healthCheckPath: /health
    envVars:
      # PORT is injected automatically by Render — do not set it here.

      # ── Tier 1: Replicate cloud AI ──────────────────────────────────────────
      # Add your token from https://replicate.com to enable full AI processing.
      # Without it the app falls back to sharp image enhancement automatically.
      - key: REPLICATE_API_TOKEN
        value: ""

      # ── Tier 1.5: HuggingFace Inference API (free AI — Real-ESRGAN) ───────────
      # Get a free token at https://huggingface.co/settings/tokens
      - key: HF_API_TOKEN
        value: ""

      - key: CLEANUP_INTERVAL_MS
        value: 3600000
      - key: MAX_FILE_SIZE_MB
        value: 10

      # ── Tier 2: Self-hosted GPU containers (optional) ──────────────────────
      - key: REMBG_API_URL
        value: ""
      - key: GFPGAN_API_URL
        value: ""
      - key: STABLE_DIFFUSION_URL
        value: ""
