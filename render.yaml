services:
  - type: web
    name: ai-profile-backend
    runtime: node
    region: oregon
    plan: free
    # No rootDir — avoids Render auto-detecting backend/Dockerfile and
    # switching to Docker mode instead of Node runtime.
    buildCommand: cd backend && npm ci --include=dev && npm run build
    startCommand: node backend/dist/server.js
    healthCheckPath: /health
    envVars:
      # PORT is set automatically by Render — do not override it here.
      - key: CLEANUP_INTERVAL_MS
        value: 3600000
      - key: MAX_FILE_SIZE_MB
        value: 10
      # Leave blank → mock mode (copies image, 1 s delay). Point at real
      # Docker containers on a GPU server to enable actual AI processing.
      - key: REMBG_API_URL
        value: ""
      - key: GFPGAN_API_URL
        value: ""
      - key: STABLE_DIFFUSION_URL
        value: ""
