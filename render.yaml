services:
  - type: web
    name: ai-profile-backend
    runtime: docker
    # Root Dockerfile builds the Node.js backend into a slim Alpine image.
    # No AI containers — all transformations run in mock mode on free tier.
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      # PORT is injected automatically by Render.
      - key: CLEANUP_INTERVAL_MS
        value: 3600000
      - key: MAX_FILE_SIZE_MB
        value: 10
      # Leave blank for mock mode. Point at real GPU containers to enable AI.
      - key: REMBG_API_URL
        value: ""
      - key: GFPGAN_API_URL
        value: ""
      - key: STABLE_DIFFUSION_URL
        value: ""
